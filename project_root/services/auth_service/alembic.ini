[alembic]
# Папка, где лежит env.py и версии миграций
script_location = alembic

# SQLAlchemy URL к твоей БД
# Для Docker обычно имя контейнера вместо localhost
#sqlalchemy.url = postgresql://auth_user:auth_pass@auth_db:5432/auth_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine
propagate = 0

[logger_alembic]
level = INFO
handlers = console
qualname = alembic
propagate = 0

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s